<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>ICAN Attendance System</title>
<style>
  :root {
    --primary: #0E7C86;
    --in-color: #1B8A4B;
    --in-bg: #E8F5E9;
    --out-color: #666666;
    --out-bg: #F5F5F5;
    --bg: #F8F9FA;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #666666;
    --border: #EFEFEF;
    --error: #D32F2F;
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
    flex-shrink: 0;
    gap: 20px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
  }

  .logo {
    height: 52px;
    width: auto;
  }

  .header-title h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0;
  }

  .header-title .sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .sync-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    padding: 8px 14px;
    background: var(--out-bg);
    border-radius: 20px;
  }

  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #999;
    animation: pulse 2s infinite;
  }

  .sync-dot.online { background: var(--in-color); animation: none; }
  .sync-dot.syncing { background: #FFA500; animation: pulse 0.6s infinite; }

  @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

  .btn {
    padding: 10px 16px;
    background: var(--out-bg);
    color: var(--text);
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn.active {
    background: var(--primary);
    color: white;
  }

  .search-section {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .search {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
  }

  .search:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(14, 124, 134, 0.1);
  }

  .grid {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    align-content: start;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; gap: 10px; padding: 10px; }
  }

  @media (min-width: 1025px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
  }

  .staff-btn {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 24px 14px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    min-height: 160px;
    font-family: inherit;
  }

  .staff-btn:active { transform: scale(0.96); }
  .staff-btn.in { background: var(--in-bg); border-color: var(--in-color); }
  .staff-btn.in .name { color: var(--in-color); }

  .name {
    font-size: 18px;
    font-weight: 700;
    text-align: center;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    background: var(--out-bg);
    color: var(--out-color);
  }

  .staff-btn.in .status-badge {
    background: rgba(27, 138, 75, 0.15);
    color: var(--in-color);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
  }

  .empty {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 250px;
    color: var(--text-muted);
    text-align: center;
    font-size: 17px;
  }

  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .card h3 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .card .value {
    font-size: 32px;
    font-weight: 700;
    color: var(--primary);
  }

  .table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }

  .table th {
    background: var(--out-bg);
    padding: 12px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid var(--border);
  }

  .table td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .confirm {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    background: var(--in-color);
    color: white;
    padding: 16px 24px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    transition: all 0.3s;
  }

  .confirm.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .hidden { display: none !important; }

  .settings-content {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
  }

  .form-field {
    margin-bottom: 20px;
  }

  .form-field label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .form-field input {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
  }

  .form-field input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .btn-primary {
    padding: 12px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
  }

  .status-box {
    padding: 12px;
    background: var(--out-bg);
    border-radius: 8px;
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-left">
      <img src="https://icanskill.com/_ipx/_/img/logo/ican.svg" alt="ICAN" class="logo" onerror="this.style.display='none'">
      <div class="header-title">
        <h1 id="headerTitle">Attendance</h1>
        <div class="sub">Tap to sign in / out</div>
      </div>
    </div>
    <div class="header-right">
      <div class="sync-indicator" id="syncIndicator">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncText">Loading…</span>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn active" onclick="switchView('kiosk')">📱 Kiosk</button>
        <button class="btn" onclick="switchView('dashboard')">📊 Dashboard</button>
        <button class="btn" onclick="switchView('settings')">⚙️ Settings</button>
      </div>
    </div>
  </header>

  <!-- KIOSK VIEW -->
  <div id="kioskView">
    <div class="search-section">
      <input id="search" class="search" type="text" placeholder="Search name…">
    </div>
    <div class="grid" id="grid">
      <div class="empty">📱 Loading…</div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboardView" class="hidden" style="flex: 1; overflow-y: auto;">
    <div class="dashboard-grid" id="dashboardContent">
      <div class="empty">📊 Loading…</div>
    </div>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="settingsView" class="hidden" style="flex: 1; overflow-y: auto;">
    <div class="settings-content">
      <h2>⚙️ Settings</h2>
      
      <div class="card" style="margin-bottom: 20px;">
        <h3>Google Apps Script URL</h3>
        <p style="color: var(--text-muted); font-size: 14px;">Paste your deployed Google Apps Script URL</p>
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/d/..." style="width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
        <button class="btn-primary" onclick="saveScriptUrl()">Save URL</button>
        <div class="status-box" id="urlStatus"></div>
      </div>

      <div class="card">
        <h3>ℹ️ Instructions</h3>
        <p style="font-size: 14px; color: var(--text-muted); margin: 0;">
          1. Deploy Code-GitHub-CORS-FIXED.gs in Google Apps Script<br>
          2. Copy the deployment URL<br>
          3. Paste it above<br>
          4. Click Save
        </p>
      </div>
    </div>
  </div>
</div>

<div class="confirm" id="confirm"></div>

<script>
  console.log('🚀 ICAN Attendance App v3.2 (GitHub Pages + CORS Fix)');

  let db = null;
  let isOnline = navigator.onLine;
  let isSyncing = false;
  let staffList = [];
  let scriptUrl = localStorage.getItem('ican_script_url') || '';

  async function initDB() {
    return new Promise((resolve) => {
      const req = indexedDB.open('ICAN_ATTENDANCE_V3', 1);
      req.onerror = () => resolve(null);
      req.onsuccess = () => { db = req.result; resolve(db); };
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('punches')) {
          const s = db.createObjectStore('punches', { keyPath: 'id' });
          s.createIndex('date', 'date');
          s.createIndex('name', 'name');
          s.createIndex('synced', 'synced');
        }
        if (!db.objectStoreNames.contains('staff')) db.createObjectStore('staff', { keyPath: 'name' });
      };
    });
  }

  function uuid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  function pad2(x) { return String(x).padStart(2, '0'); }

  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }

  function timeString(d = new Date()) {
    return pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
  }

  // Call Google Apps Script backend
  async function callGAS(functionName, params = []) {
    if (!scriptUrl) {
      console.error('❌ No script URL');
      return null;
    }

    try {
      console.log(`📞 Calling ${functionName}...`);
      
      const response = await fetch(scriptUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ function: functionName, parameters: params })
      });

      const text = await response.text();
      const data = JSON.parse(text);
      console.log(`✅ ${functionName}:`, data);
      return data;
    } catch (err) {
      console.error(`❌ ${functionName}:`, err);
      return null;
    }
  }

  // Sync staff list
  async function syncStaffList() {
    console.log('👥 Syncing staff...');
    const data = await callGAS('getKioskData', []);
    
    if (data && Array.isArray(data)) {
      staffList = data;
      console.log(`✅ Loaded ${staffList.length} staff`);
    } else {
      console.warn('⚠️ Using cached staff');
      const tx = db.transaction(['staff'], 'readonly');
      const result = await new Promise(r => {
        tx.objectStore('staff').getAll().onsuccess = (e) => r(e.target.result);
      });
      staffList = result.map(s => s.name) || [];
    }
  }

  // Punch
  async function punch(name, currentAction) {
    const nextAction = currentAction === 'In' ? 'Out' : 'In';
    const now = new Date();

    const p = {
      id: uuid(),
      name,
      action: nextAction,
      date: todayKey(),
      time: timeString(now),
      timestamp: now.getTime(),
      guard: 'KIOSK',
      synced: false
    };

    try {
      const tx = db.transaction(['punches'], 'readwrite');
      tx.objectStore('punches').add(p);
      
      await new Promise(r => { tx.oncomplete = r; tx.onerror = r; });
      console.log('✅ Punch saved');

      document.getElementById('confirm').innerHTML = `<span>${nextAction === 'In' ? '📍' : '🚪'}</span><span><strong>${name}</strong> signed ${nextAction.toLowerCase()}</span>`;
      document.getElementById('confirm').className = 'confirm show';
      
      document.getElementById('search').value = '';
      render();
      renderDashboard();
      setTimeout(() => document.getElementById('confirm').classList.remove('show'), 2200);

      if (isOnline) setTimeout(() => syncPunches(), 800);
    } catch (err) {
      alert('Error: ' + err);
    }
  }

  // Sync punches
  async function syncPunches() {
    if (isSyncing || !isOnline || !scriptUrl) return;
    
    isSyncing = true;
    updateSyncStatus();

    try {
      const tx = db.transaction(['punches'], 'readonly');
      const unsynced = await new Promise(r => {
        tx.objectStore('punches').index('synced').getAll(false).onsuccess = (e) => r(e.target.result);
      });

      if (unsynced.length === 0) {
        isSyncing = false;
        updateSyncStatus();
        return;
      }

      const result = await callGAS('syncPunches', [unsynced]);

      if (result && result.ok) {
        const tx2 = db.transaction(['punches'], 'readwrite');
        unsynced.forEach(p => {
          p.synced = true;
          tx2.objectStore('punches').put(p);
        });
        await new Promise(r => { tx2.oncomplete = r; });
        console.log('✅ Synced');
      }

      isSyncing = false;
      updateSyncStatus();
    } catch (err) {
      console.error('❌ Sync error:', err);
      isSyncing = false;
      updateSyncStatus();
    }
  }

  // Render kiosk
  async function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const grid = document.getElementById('grid');

    try {
      const tx = db.transaction(['punches'], 'readonly');
      const todayPunches = await new Promise(r => {
        tx.objectStore('punches').index('date').getAll(todayKey()).onsuccess = (e) => r(e.target.result);
      });

      const byName = {};
      todayPunches.forEach(p => {
        if (!byName[p.name]) byName[p.name] = [];
        byName[p.name].push(p);
      });

      let shown = staffList;
      if (q) shown = staffList.filter(s => s.toLowerCase().includes(q));

      if (!shown.length) {
        grid.innerHTML = '<div class="empty">👥 No staff</div>';
        return;
      }

      grid.innerHTML = shown.map(name => {
        const ps = byName[name] || [];
        const last = ps.length ? ps[ps.length - 1].action : 'Out';
        const isIn = last === 'In';

        return `<button class="staff-btn ${isIn ? 'in' : ''}" onclick="punch('${name}', '${last}')">
          <div class="name">${name}</div>
          <div class="status-badge"><span class="status-dot"></span><span>${isIn ? 'Signed in' : 'Signed out'}</span></div>
        </button>`;
      }).join('');
    } catch (err) {
      grid.innerHTML = '<div class="empty">❌ Error</div>';
    }
  }

  // Render dashboard
  async function renderDashboard() {
    const content = document.getElementById('dashboardContent');

    try {
      const tx = db.transaction(['punches'], 'readonly');
      const allPunches = await new Promise(r => {
        tx.objectStore('punches').getAll().onsuccess = (e) => r(e.target.result);
      });

      const todayPunches = allPunches.filter(p => p.date === todayKey());
      const uniqueNames = [...new Set(todayPunches.map(p => p.name))];
      const signedIn = uniqueNames.filter(name => {
        const ps = todayPunches.filter(p => p.name === name);
        return ps.length && ps[ps.length - 1].action === 'In';
      });

      content.innerHTML = `
        <div class="card"><h3>Total</h3><div class="value">${todayPunches.length}</div></div>
        <div class="card"><h3>Signed In</h3><div class="value" style="color: var(--in-color);">${signedIn.length}</div></div>
        <div class="card"><h3>Signed Out</h3><div class="value">${uniqueNames.length - signedIn.length}</div></div>
        <div style="grid-column: 1 / -1;" class="card">
          <h3>Today's Activity</h3>
          <table class="table"><thead><tr><th>Name</th><th>Action</th><th>Time</th></tr></thead>
          <tbody>${todayPunches.sort((a, b) => b.timestamp - a.timestamp).map(p => `
            <tr><td>${p.name}</td><td>${p.action}</td><td>${p.time.slice(0, 5)}</td></tr>
          `).join('')}</tbody></table>
        </div>
      `;
    } catch (err) {
      content.innerHTML = '<div class="empty">❌ Error</div>';
    }
  }

  // Settings
  function saveScriptUrl() {
    const url = document.getElementById('scriptUrl').value.trim();
    if (!url) { alert('Enter URL'); return; }
    localStorage.setItem('ican_script_url', url);
    scriptUrl = url;
    document.getElementById('urlStatus').textContent = '✅ Saved! Testing...';
    testConnection();
  }

  async function testConnection() {
    const status = document.getElementById('urlStatus');
    status.textContent = '⏳ Testing...';
    
    const result = await callGAS('getKioskData', []);
    
    if (result && Array.isArray(result)) {
      status.textContent = `✅ Connected! Loaded ${result.length} staff`;
      setTimeout(() => location.reload(), 1500);
    } else {
      status.textContent = '❌ Connection failed. Check URL and console (F12)';
    }
  }

  // View switching
  function switchView(view) {
    document.getElementById('kioskView').classList.add('hidden');
    document.getElementById('dashboardView').classList.add('hidden');
    document.getElementById('settingsView').classList.add('hidden');

    if (view === 'kiosk') {
      document.getElementById('kioskView').classList.remove('hidden');
      render();
    } else if (view === 'dashboard') {
      document.getElementById('dashboardView').classList.remove('hidden');
      renderDashboard();
    } else if (view === 'settings') {
      document.getElementById('settingsView').classList.remove('hidden');
      document.getElementById('scriptUrl').value = scriptUrl;
    }
  }

  function updateSyncStatus() {
    const dot = document.getElementById('syncDot');
    const text = document.getElementById('syncText');

    if (!isOnline) {
      dot.className = 'sync-dot';
      text.textContent = 'Offline';
    } else if (isSyncing) {
      dot.className = 'sync-dot syncing';
      text.textContent = 'Syncing…';
    } else {
      dot.className = 'sync-dot online';
      text.textContent = 'Online';
    }
  }

  // Init
  async function init() {
    console.log('📦 Starting...');
    await initDB();
    scriptUrl = localStorage.getItem('ican_script_url') || '';
    
    document.getElementById('search').addEventListener('input', render);
    window.addEventListener('online', () => { isOnline = true; updateSyncStatus(); syncPunches(); });
    window.addEventListener('offline', () => { isOnline = false; updateSyncStatus(); });

    if (scriptUrl) {
      await syncStaffList();
      render();
      updateSyncStatus();
      syncPunches();
      setInterval(() => { if (isOnline && !isSyncing) syncPunches(); }, 60000);
    } else {
      switchView('settings');
    }

    console.log('✅ Ready');
  }

  window.punch = punch;
  window.switchView = switchView;
  window.saveScriptUrl = saveScriptUrl;
  window.testConnection = testConnection;

  init();
</script>
</body>
</html>
